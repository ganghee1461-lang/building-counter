<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건축물 세대수 집계기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="map-wrap">
      <div id="map"></div>

      <div class="topbar">
        <div class="brand">
          <span class="brand-mark">BC</span>
          <div>
            <div class="brand-name">건축물 세대수 집계기</div>
            <div class="brand-sub">Made by 배강희</div>
          </div>
        </div>
        <div class="search-box">
          <select id="sigSelect">
            <option value="">시군구 선택</option>
            <option value="43111">청주시 상당구</option>
            <option value="43112">청주시 서원구</option>
            <option value="43113">청주시 흥덕구</option>
            <option value="43114">청주시 청원구</option>
            <option value="43130">충주시</option>
            <option value="43150">제천시</option>
            <option value="43720">보은군</option>
            <option value="43730">옥천군</option>
            <option value="43740">영동군</option>
            <option value="43745">증평군</option>
          </select>
          <input id="searchInput" type="text" placeholder="주소 검색 (예: 청주시 상당구 ...)" />
          <button id="searchBtn">검색</button>
        </div>
      </div>

      <div class="legend">
        <div class="legend-title">조작 방법</div>
        <div class="legend-row"><kbd>SHIFT</kbd> + 드래그 <span>영역 선택</span></div>
        <div class="legend-row"><kbd>CTRL</kbd> + 클릭 <span>개별 토글</span></div>
        <div class="legend-row"><kbd>클릭</kbd> <span>단일 선택</span></div>
        <div class="legend-row">
          <button id="reloadBtn" class="mini-btn">↻ 이 영역 건물 불러오기</button>
        </div>
      </div>

      <div class="status-bar">
        <div id="statusMsg">준비</div>
        <div id="loadIndicator" class="load-indicator" hidden>
          <span class="dot"></span><span>조회 중</span>
        </div>
      </div>
    </main>

    <aside class="panel">
      <div class="summary">
        <div class="summary-title">합계</div>

        <!-- 계량기 총합 -->
        <div class="meter-total">
          <div class="meter-total-label">계량기 합계</div>
          <div class="meter-total-value"><span id="sumHhld">0</span><span class="meter-unit">개</span></div>
        </div>

        <!-- 용도별 소계 -->
        <div class="meter-breakdown">
          <div class="breakdown-row" id="row-apartment">
            <span class="type-badge" style="background:#1a3a6e;color:#7ab4ff">공동주택</span>
            <span id="sumApartment">0</span>
            <span class="bd-unit">세대</span>
          </div>
          <div class="breakdown-row" id="row-single">
            <span class="type-badge" style="background:#1a4a2e;color:#6ddb97">단독주택</span>
            <span id="sumSingle">0</span>
            <span class="bd-unit">가구</span>
          </div>
          <div class="breakdown-row" id="row-oneroom">
            <span class="type-badge" style="background:#3a2a6e;color:#b47aff">원룸</span>
            <span id="sumOneroom">0</span>
            <span class="bd-unit">세대</span>
          </div>
          <div class="breakdown-row" id="row-commercial">
            <span class="type-badge" style="background:#4a2a1a;color:#ffaa4a">일반용</span>
            <span id="sumCommercial">0</span>
            <span class="bd-unit">호</span>
          </div>
        </div>

        <div class="summary-sub">선택 건물 <strong id="sumCount">0</strong>동</div>

        <div class="actions">
          <button id="clearBtn" class="btn-secondary">전체 해제</button>
          <button id="exportBtn" class="btn-primary">CSV 내보내기</button>
        </div>
      </div>

      <div class="list-header">
        <span>선택 목록</span>
        <span id="listCount" class="badge">0</span>
      </div>
      <div class="list-wrap">
        <ul id="selectionList"></ul>
        <div id="emptyState" class="empty">
          <div class="empty-icon">⌖</div>
          <div>지도에서 건물을 선택하세요</div>
          <div class="empty-sub">SHIFT+드래그 또는 클릭</div>
        </div>
      </div>
    </aside>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
  <script src="app.js"></script>
</body>
</html>
